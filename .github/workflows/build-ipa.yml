name: Build KinglessAdblocker IPA

# 修复Bug 1：同时兼容 master 和 main 分支，并且增加手动运行按钮
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build and Package IPA
    # 强制锁定微软最新版的云端 Mac 服务器！
    runs-on: macos-latest

    steps:
      # 1. 检出代码 (必须要有这一步，否则云端Mac是空的，直接报6秒红叉！)
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. 安装工程生成器 Xcodegen
      - name: ⚙️ Install Xcodegen
        run: brew install xcodegen

      # 3. 根据 project.yml 动态生成 Xcode 工程
      - name: 🏗️ Generate Xcode Project
        run: xcodegen generate

      # 4. 暴力免签编译（极其核心的编译指令，剥离苹果签名校验）
      - name: 🔨 Build App (No Sign)
        run: |
          xcodebuild clean build \
            -project KinglessAdblocker.xcodeproj \
            -scheme KinglessAdblocker \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build_output

      # 5. 组装 Payload 文件夹并压缩成巨魔专属的 .ipa 格式
      - name: 📦 Package IPA
        run: |
          mkdir -p Payload
          mv build_output/KinglessAdblocker.app Payload/
          zip -r KinglessAdblocker.ipa Payload

      # 6. 把 .ipa 文件作为战利品传到前台供你下载
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KinglessAdblocker-IPA
          path: KinglessAdblocker.ipa